[project]
name = "bio-reasoning"
version = "0.1.0"
description = "BioReasoning Challenge 2026 (MLGenX @ ICLR 2026)"
requires-python = ">=3.11"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bio_reasoning"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
]
